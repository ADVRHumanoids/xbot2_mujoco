services:
  dev:
    build: .
    stdin_open: true
    tty: true 
    entrypoint: /bin/bash
    restart: no
    volumes:
      - /home/$USER/.ssh:/home/user/.ssh
      - ./scripts:/home/user/scripts
      - ../..:/home/user/test_ws/src/xbot2_mujoco
    environment:
      - TERM=xterm-256color
      - FOREST_JOBS
